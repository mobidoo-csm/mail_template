<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sauce Solution Mail Hub</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root {
            --sauce-orange: #ff5f00;
            --sauce-orange-light: #fff5ec;
            --sauce-black: #111827;
            --sauce-gray: #6b7280;
            --bg-color: #f8fafc;
            --card-border: #e2e8f0;
            --svg-default: #94a3b8;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #cbd5e1; 
            background-image: radial-gradient(#94a3b8 1px, transparent 1px);
            background-size: 20px 20px;
            color: var(--sauce-black);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* 🍎 사파리 브라우저 프레임 */
        .safari-window {
            background-color: var(--bg-color);
            width: 100%;
            max-width: 1100px;
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25), 0 0 0 1px rgba(0,0,0,0.05);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .safari-header {
            background-color: #f1f5f9;
            height: 54px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 1px solid #e2e8f0;
        }

        .safari-dots { display: flex; gap: 8px; width: 80px; }
        .safari-dots span { width: 12px; height: 12px; border-radius: 50%; }
        .dot-red { background-color: #ff5f56; }
        .dot-yellow { background-color: #ffbd2e; }
        .dot-green { background-color: #27c93f; }

        .safari-url {
            background-color: #ffffff;
            height: 28px;
            padding: 0 20px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: #64748b;
            font-weight: 500;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            flex: 1;
            max-width: 400px;
            justify-content: center;
        }

        .safari-right { width: 80px; }

        .hub-header {
            text-align: center;
            padding: 70px 20px 40px;
            width: 100%;
            box-sizing: border-box;
        }

        .hub-header .badge {
            display: inline-block;
            background-color: var(--sauce-orange-light);
            color: var(--sauce-orange);
            font-size: 13px;
            font-weight: 800;
            padding: 6px 16px;
            border-radius: 20px;
            margin-bottom: 16px;
            letter-spacing: 0.5px;
        }

        .hub-header h1 { font-size: 36px; font-weight: 900; margin: 0 0 12px 0; letter-spacing: -1px; }
        .hub-header p { font-size: 16px; color: var(--sauce-gray); margin: 0; }

        .hub-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 24px;
            padding: 20px 20px 80px 20px;
            width: 100%;
            box-sizing: border-box;
            flex-wrap: wrap;
        }

        .product-group { display: flex; gap: 20px; }

        .divider {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #ffffff;
            border: 2px dashed #cbd5e1;
            color: #94a3b8;
        }

        /* 카드 공통 스타일 */
        .card {
            background-color: #ffffff;
            border: 1px solid var(--card-border);
            border-radius: 24px;
            width: 220px;
            padding: 40px 24px;
            text-align: center;
            text-decoration: none;
            color: var(--sauce-black);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.02);
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
        }

        /* 호버 시 연한 오렌지 배경 + 진한 오렌지 테두리 */
        .card:hover {
            transform: translateY(-8px);
            background-color: var(--sauce-orange-light);
            border-color: var(--sauce-orange);
            box-shadow: 0 20px 40px rgba(255, 95, 0, 0.1);
        }

        .card .icon-box {
            width: 44px;
            height: 44px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        /* SVG 색상 연동 */
        .card svg { width: 100%; height: 100%; fill: var(--svg-default); transition: fill 0.3s ease; }
        .card:hover svg { fill: var(--sauce-orange); transform: scale(1.1); }

        .card h2 { font-size: 20px; font-weight: 800; margin: 0 0 10px 0; transition: color 0.3s ease; }
        .card:hover h2 { color: var(--sauce-orange); }

        .card p { font-size: 14px; color: var(--sauce-gray); margin: 0; line-height: 1.5; transition: color 0.3s ease; }

        @media (max-width: 950px) {
            .hub-container { flex-direction: column; }
            .product-group { flex-direction: column; width: 100%; align-items: center; }
            .card { width: 100%; max-width: 320px; }
            .divider { transform: rotate(90deg); margin: 10px 0; }
        }
    </style>
</head>
<body>

<div class="safari-window">

</div>
</body>
